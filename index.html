<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Blog</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; line-height: 1.6; }
    .post { margin-bottom: 60px; }
    hr { margin: 40px 0; }
  </style>
</head>
<body>

  <h1>Welcome</h1>
  <p>Hey there! I'm the Binary Architect. I'm an independent thinker writing on various topics.</p>

  <div id="posts"></div>

  <script>
    // List your post files here
    const posts = [
      "blog/03-2026_Reborn_from_ashes.html"
      // Add more like:
      // "blog/second-post.html",
      // "blog/third-post.html"
    ];

    const container = document.getElementById("posts");

    posts.forEach(url => {
      fetch(url)
        .then(response => response.text())
        .then(html => {
          const wrapper = document.createElement("div");
          wrapper.className = "post";
          wrapper.innerHTML = html;
          container.appendChild(wrapper);
          container.appendChild(document.createElement("hr"));
        });
    });
  </script>

</body>
</html>
